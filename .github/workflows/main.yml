name: JARVIS TITAN CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  DATABASE_URL: postgresql://jarvis:jarvis@localhost:5432/jarvis
  REDIS_URL: redis://localhost:6379/0
  JARVIS_ENV: test
  SIEM_ENDPOINT: http://localhost:9999/mock-siem
  SIEM_API_KEY: test-key
  RBAC_DEFAULT_ACTOR: "test-actor:Admin"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
          POSTGRES_DB: jarvis
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: jarvis/requirements.txt

      - name: Install dependencies
        working-directory: jarvis
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: jarvis
        run: ruff check . --select E,F,W --ignore E501 || true

      - name: Compile check
        working-directory: jarvis
        run: python -m compileall -q .

      - name: Run tests
        working-directory: jarvis
        run: python -m pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: jarvis
        run: docker build -t jarvis:titan-v55 .
