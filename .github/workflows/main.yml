name: JARVIS CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  JARVIS_ENV: test

jobs:
  # ── Lint: correctness-critical ruff rules must pass (no `|| true`) ──────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: jarvis/requirements/dev.txt
      - name: Install dev profile
        working-directory: jarvis
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
      - name: Ruff (correctness gate)
        working-directory: jarvis
        run: ruff check .
      - name: Compile check (Python 3.11 grammar)
        working-directory: jarvis
        run: python -m compileall -q core tools scripts main.py __main__.py

  # ── Tests: base + dev only, no audio/GPU/Ollama/Postgres/Redis ─────────────
  tests-base:
    runs-on: ubuntu-latest
    env:
      RBAC_DEFAULT_ACTOR: "test-actor:Admin"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: jarvis/requirements/dev.txt
      - name: Install base + dev + soc (drivers used by the test suite)
        working-directory: jarvis
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt -r requirements/soc.txt
      - name: Run test suite
        working-directory: jarvis
        run: python -m pytest -q --tb=short
      - name: Doctor (must not error the base env)
        working-directory: jarvis
        run: python scripts/doctor.py
      - name: Model doctor (Ollama optional → exit 0)
        working-directory: jarvis
        run: python scripts/model_doctor.py

  # ── Security: static analysis + dependency audit ───────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
      - name: Bandit (high-severity only)
        working-directory: jarvis
        run: bandit -r core tools -ll -q
      - name: pip-audit (base profile)
        working-directory: jarvis
        run: pip-audit -r requirements/base.txt || true

  # ── Docker: base text-mode image builds ────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, tests-base]
    steps:
      - uses: actions/checkout@v4
      - name: Build base image
        working-directory: jarvis
        run: docker build -t jarvis:base .
