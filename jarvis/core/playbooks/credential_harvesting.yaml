name: credential_harvesting
description: Response to LSASS access or credential dumping indicators
auto_authorize: false
trigger:
  incident_type: credential_harvesting
  severity_min: 7.5
  mitre_any: [T1003, T1003.001]
steps:
  - action: broadcast_alert
    params:
      message: "Credential harvesting detected — immediate isolation"
      severity: CRITICAL
  - action: isolate_ip
    params:
      ip: "{{incident.involved_hosts.first}}"
      ttl_minutes: 120
  - action: snapshot_vm
    params:
      vmx: "{{config.SECONDARY_VMS.0}}"
      snapshot_name: "cred_harvest_{{incident.incident_id}}"
  - action: run_volatility
    params:
      plugins: [windows.malfind, windows.pslist, windows.cmdline]
